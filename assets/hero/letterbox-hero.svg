<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Agent Letterbox FOR TMUX — the doorbell that makes agents a team">
  <defs>
    <linearGradient id="desk" x1="0" y1="0" x2="0.85" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="55%" stop-color="#FAFBFC"/>
      <stop offset="100%" stop-color="#F3F5F7"/>
    </linearGradient>
    <radialGradient id="glow" cx="42%" cy="46%" r="48%">
      <stop offset="0%" stop-color="#6B8F7A" stop-opacity="0.14"/>
      <stop offset="45%" stop-color="#6B8F7A" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#6B8F7A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spot" cx="50%" cy="40%" r="35%">
      <stop offset="0%" stop-color="#6B8F7A" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#6B8F7A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7F3EB"/>
      <stop offset="100%" stop-color="#EDE6D8"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0EBE0"/>
      <stop offset="100%" stop-color="#E2DACB"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1A2332" flood-opacity="0.12"/>
    </filter>
    <filter id="markGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
