/>
    </g>
  </defs>

  <!-- field -->
  <rect width="1600" height="900" fill="url(#desk)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>
  <ellipse cx="500" cy="380" rx="360" ry="280" fill="url(#spot)"/>

  <!-- fine grid hint (style, very subtle) -->
  <g opacity="0.06" stroke="#1A2332" stroke-width="1">
    <path d="M0 180 H1600 M0 360 H1600 M0 540 H1600 M0 720 H1600"/>
    <path d="M200 0 V900 M400 0 V900 M600 0 V900 M800 0 V900 M1000 0 V900 M1200 0 V900 M1400 0 V900"/>
  </g>

  <!-- pulse rings -->
  <g transform="translate(500,400)" fill="none" stroke="#6B8F7A">
    <circle r="195" stroke-width="1.6" opacity="0.28"/>
    <circle r="245" stroke-width="1.3" opacity="0.18"/>
    <circle r="295" stroke-width="1.1" opacity="0.11"/>
    <circle r="345" stroke-width="0.9" opacity="0.07"/>
  </g>

  <!-- HERO mark -->
  <g filter="url(#markGlow)" transform="translate(500,380) scale(6.241803) translate(371.306794,-168.743042)">
    <use href="#bell2-mark"/>
  </g>
  <text x="500" y="628" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="12" font-weight="600" letter-spacing="0.22em" fill="#5A6575">THE DOORBELL</text>
  <text x="500" y="656" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="19" fill="#4A7A62">what turns agents into a team</text>

  <!-- shared mail cards -->
  <g transform="translate(78,128) scale(0.70)" filter="url(#cardShadow)" opacity="0.95">
    <g transform="translate(0,40) rotate(-5.5)">
      <rect x="10" y="14" width="300" height="200" rx="12" fill="#1A2332"/>
      <rect width="300" height="200" rx="12" fill="url(#cardA)"/>
      <rect x="28" y="38" width="128" height="10" rx="3" fill="#1A2332" opacity="0.14"/>
      <rect x="28" y="60" width="208" height="8" rx="2" fill="#1A2332" opacity="0.08"/>
      <rect x="28" y="78" width="176" height="8" rx="2" fill="#1A2332" opacity="0.08"/>
      <text x="28" y="150" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#5C7A6E">letterbox/inbox/</text>
      <text x="28" y="172" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#1A2332" opacity="0.38">inbox · outbox · ring</text>
    </g>
    <g transform="translate(38,18) rotate(3)">
      <rect x="8" y="12" width="280" height="180" rx="12" fill="#1A2332"/>
      <rect width="280" height="180" rx="12" fill="url(#cardB)"/>
      <rect x="26" y="36" width="108" height="9" rx="2" fill="#1A2332" opacity="0.12"/>
      <rect x="26" y="56" width="188" height="7" rx="2" fill="#1A2332" opacity="0.07"/>
      <rect x="26" y="74" width="150" height="7" rx="2" fill="#1A2332" opacity="0.07"/>
    </g>
  </g>
  <text x="185" y="348" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
        font-size="12" letter-spacing="0.06em" fill="#5A6575">shared mail between agents</text>

  <!-- terminal -->
  <g transform="translate(72,708)" filter="url(#cardShadow)">
    <rect width="430" height="128" rx="14" fill="#0A0E14" stroke="#2E3A4C" stroke-width="1.5"/>
    <circle cx="26" cy="26" r="5.5" fill="#6B8F7A"/>
    <circle cx="46" cy="26" r="5.5" fill="#8A93A3" opacity="0.45"/>
    <circle cx="66" cy="26" r="5.5" fill="#8A93A3" opacity="0.28"/>
    <text x="26" y="64" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#8FBC9A">📬 letterbox doorbell</text>
    <text x="26" y="94" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#6B8F7A">team notified · work continues</text>
  </g>

  <!-- right column copy -->
  <text x="902" y="236" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="700" letter-spacing="0.18em" fill="#5A6575">FOR TMUX</text>
  <text x="900" y="288" font-family="ui-serif, Georgia, 'Times New Roman', serif" font-size="56" font-weight="600" fill="#1A2332">Agent Letterbox</text>
  <text x="902" y="348" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="500" fill="#3D6B54">The doorbell makes it a team.</text>

  <text x="902" y="410" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="19" fill="#3A4558">Alone, every agent is an island.</text>
  <text x="902" y="442" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="19" fill="#3A4558">With the letterbox and the ring, they share</text>
  <text x="902" y="474" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="19" fill="#3A4558">work, hand off tasks, and stay in sync —</text>
  <text x="902" y="506" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="19" fill="#3A4558">together the team becomes stronger.</text>

  <!-- agent chips -->
  <g transform="translate(902, 548)" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">
    <rect width="58" height="30" rx="15" fill="#F0F3F6" stroke="#C5CDD8" stroke-width="1"/>
    <text x="29" y="20" text-anchor="middle" fill="#3A4558">pi</text>
    <rect x="66" width="78" height="30" rx="15" fill="#F0F3F6" stroke="#C5CDD8" stroke-width="1"/>
    <text x="105" y="20" text-anchor="middle" fill="#3A4558">claude</text>
    <rect x="152" width="68" height="30" rx="15" fill="#E8F2EC" stroke="#6B8F7A" stroke-width="1"/>
    <text x="186" y="20" text-anchor="middle" fill="#3D6B54">grok</text>
    <rect x="228" width="78" height="30" rx="15" fill="#F0F3F6" stroke="#C5CDD8" stroke-width="1"/>
    <text x="267" y="20" text-anchor="middle" fill="#3A4558">hermes</text>
  </g>

  <text x="902" y="628" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="17" fill="#5A6575">Files are the letters on the bus.</text>
  <text x="902" y="656" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="17" fill="#5A6575">The doorbell is the call that keeps the team moving.</text>

  <text x="902" y="720" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="14" letter-spacing="0.04em" fill="#7A8494">Terminal-first  ·  filesystem-first  ·  multi-agent</text>
</svg>
