name: smoke

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  smoke:
    name: smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run isolated smoke test
        run: |
          bash tests/smoke.sh
          bash tests/cmux-doorbell-safety.sh
          bash tests/test_desktop_adapter.sh
          bash tests/webhook_e2e_harness.sh
          python3 tests/test_skill_prompt.py
